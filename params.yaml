# ============================================================
# params.yaml — DVC-tracked hyperparameters
# Top-K retrieval only (no score threshold filtering)
# ============================================================

preprocessing:
  # Columns used for TF-IDF feature construction
  # Ordered by importance
  text_cols:
    - indications
    - mode_of_action
    - contraindications
    - side_effects
    - interactions
    - precautions
    - dosage
    - generic_name

  # Value used to fill missing text fields
  fill_value: "not specified"

# ------------------------------------------------------------
features:
  # Maximum vocabulary size for TF-IDF
  tfidf_max_features: 8000

  # Capture both single words and medical phrases
  ngram_range_min: 1
  ngram_range_max: 2

  # Number of results returned per query
  top_k: 10

# ------------------------------------------------------------
model:
  # Similarity metric for ranking
  similarity_metric: "cosine"

  # NOTE:
  # No threshold is used anymore.
  # The system ALWAYS returns top_k most similar results.