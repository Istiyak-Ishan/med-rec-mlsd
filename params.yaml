# ============================================================
# params.yaml — DVC-tracked hyperparameters
# Top-K retrieval only (no score threshold filtering)
# ============================================================

preprocessing:
  # Columns used for TF-IDF feature construction
  # Ordered by importance
  text_cols:
    - indications
    - mode_of_action
    - contraindications
    - side_effects
    - interactions
    - precautions
    - dosage
    - generic_name

  # Value used to fill missing text fields
  fill_value: "not specified"

features:
  model_name: "sentence-transformers/all-MiniLM-L6-v2"   # HuggingFace model ID
  embedding_dim: 384                                        # MiniLM output dimension
  batch_size: 64                                            # medicines per encode batch
  top_k: 10                                                 # default results to return
  normalize_embeddings: true                                # L2-normalize → dot product = cosine sim

model:
  similarity_metric: "cosine"
  min_score_threshold: 0.25     # raise from 0.05 — MiniLM scores are denser than TF-IDF
# ------------------------------------------------------------

  # NOTE:
  # No threshold is used anymore.
  # The system ALWAYS returns top_k most similar results.