# ============================================================
#  dvc.yaml  -  DVC Pipeline Definition
#  Medicine Recommendation System  |  DS 4491
#
#  Run the full pipeline:   dvc repro
#  Run a single stage:      dvc repro <stage_name>
#  Visualise DAG:           dvc dag
#  Show metrics:            dvc metrics show
#  Compare experiments:     dvc params diff
# ============================================================

stages:

  # ----------------------------------------------------------
  #  STAGE 1 - preprocess
  #  Cleans raw MedEasy CSV: fills NaN text fields, normalises
  #  casing, and concatenates text_cols into combined_text.
  # ----------------------------------------------------------
  preprocess:
    cmd: python src/data/preprocess.py
    deps:
      - data/raw/medeasy_cleaned_database.csv
      - src/data/preprocess.py
    params:
      - params.yaml:
          - preprocessing
    outs:
      - data/processed/medeasy_processed.csv

  # ----------------------------------------------------------
  #  STAGE 2 - generate_embeddings
  #  Encodes combined_text with MiniLM (all-MiniLM-L6-v2) via
  #  ONNX backend. Produces a (2544, 384) float32 numpy matrix.
  #  Replaces the old TF-IDF build_features stage.
  # ----------------------------------------------------------
  generate_embeddings:
    cmd: python src/features/generate_embeddings.py
    deps:
      - data/processed/medeasy_processed.csv
      - src/features/generate_embeddings.py
    params:
      - params.yaml:
          - features.model_name
          - features.batch_size
          - features.normalize_embeddings
          - features.top_k
    outs:
      - data/features/embeddings.pkl
      - data/features/medicine_index.pkl
      - data/features/model_metadata.json

  # ----------------------------------------------------------
  #  STAGE 3 - train
  #  Builds MedicineRecommender using cosine similarity on
  #  L2-normalized embeddings (dot product). Evaluates and
  #  serialises the recommender object.
  # ----------------------------------------------------------
  train:
    cmd: python src/models/train.py
    deps:
      - data/features/embeddings.pkl
      - data/features/medicine_index.pkl
      - src/models/train.py
    params:
      - params.yaml:
          - model.similarity_metric
          - model.min_score_threshold
    outs:
      - models/recommender.pkl
    metrics:
      - metrics/scores.json:
          cache: false

  # ----------------------------------------------------------
  #  STAGE 4 - serve
  #  Starts the FastAPI inference server.
  #  frozen: true -> skipped by dvc repro, run manually:
  #    uvicorn src.serving.api:app --reload --port 8000
  # ----------------------------------------------------------
  serve:
    cmd: uvicorn src.serving.api:app --reload --port 8000
    deps:
      - models/recommender.pkl
      - src/serving/api.py
    frozen: true
